# Set reload TMUX
unbind r
bind r source-file ~/.config/tmux/tmux.conf \; display-message "tmux.conf reloaded."

# Set leader
unbind C-b
set -g prefix C-s
bind C-s send-prefix

# Rename window
bind R command-prompt "rename-window %%"

# Set vertical & horizontal split
unbind %
bind s split-window -v -c "#{pane_current_path}"
unbind '"'
bind v split-window -h -c "#{pane_current_path}"

# Resize window
bind z resize-pane -Z
bind -r -T prefix , resize-pane -L 20
bind -r -T prefix . resize-pane -R 20
bind -r -T prefix - resize-pane -D 7
bind -r -T prefix = resize-pane -U 7

# Base options
set-option -g status-position top
set-option -g focus-events on
set -g mouse on
set -g escape-time 1

set -g default-terminal "tmux-256color"
set -as terminal-overrides ",xterm-kitty:Tc"

# Underlines
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'

# Fix Home/End keys specifically inside Kitty + Tmux
bind-key -n Home send-key "\033[H"
bind-key -n End send-key "\033[F"

# Start windows & panes at 1, not 0
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# Set vi-mode
set-window-option -g mode-keys vi

# open lazygit in a new window with prefix+g
bind-key g new-window -n lazygit -c "#{pane_current_path}" "lazygit"

# Keybindigs
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

# Allows image protocols to pass through (essential for kitty's graphics protocol)
set -gq allow-passthrough on
# Optionally disable visual activity indicators if they interfere with rendering
set -g visual-activity off

set -g default-shell /bin/zsh

# Configure tmux-yank to use vi-mode selections smoothly
bind-key -T copy-mode-vi v send-keys -X begin-selection
set -g @yank_selection_mouse 'clipboard' # Copy mouse selections directly to system clipboard
# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'janoamaral/tokyo-night-tmux'

run '~/.tmux/plugins/tpm/tpm'
